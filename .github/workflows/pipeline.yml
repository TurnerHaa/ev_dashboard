name: EV Data Pipeline

on:
  schedule:
    - cron: '0 0 * * 1-2'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          # Specific engine needed for your pd.read_excel(engine='odf') calls
          pip install odfpy 

      - name: Setup dbt Profile
        run: |
          mkdir -p ~/.dbt
          echo "
          ev_project:
            outputs:
              dev:
                type: postgres # Change to your DB type (snowflake, etc)
                host: \"{{ env_var('DB_HOST') }}\"
                user: \"{{ env_var('DB_USER') }}\"
                password: \"{{ env_var('DB_PASSWORD') }}\"
                port: 5432
                dbname: postgres
                schema: public
                threads: 1
            target: dev
          " > ~/.dbt/profiles.yml

      - name: Run Python Pipeline
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: python ev_pipeline.py
